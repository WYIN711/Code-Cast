services:
  web:
    build:
      context: ../packages/web
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - codecast_data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/sessions.db
      - NODE_ENV=production
      - NEXTAUTH_URL=https://code-cast.dev
    networks:
      - codecast

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - codecast
    depends_on:
      - web

volumes:
  codecast_data:
  caddy_data:
  caddy_config:

networks:
  codecast:
